# cat > docker-compose.yaml << 'EOF'
services:
  web:
    image: ${DOCKERHUB_USER}/${APP_NAME}:${APP_TAG}

    restart: always

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic noinput &&
      gunicorn config.wsgi:application 0.0.0.0:8000
      "

    env_file:
      - path: ../django-app/.env

    ports:
      - "8000:8000"

    volumes:
      - app_logs:/app/logs
#      - app_avatars:/app/avatars

    depends_on:
      database:
        condition: service_healthy

    networks:
      - django_app


  database:
    image: mysql:8.4

    restart: always

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    environment:
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
      MYSQL_USER: ${DB_USER:?DB_USER is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"

    volumes:
      - mysql_data:/var/lib/mysql

    ports:
      - "3306:3306"

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$$MYSQL_USER\" -p\"MYSQL_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - django_app


volumes:
  app_logs:
  app_avatars:
  mysql_data:


networks:
  django_app:
#    driver: bridge  # default
